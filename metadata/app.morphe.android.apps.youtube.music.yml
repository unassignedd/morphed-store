Summary: 'YouTube Music Premium'
Description: |
  This mod comes with a dedicated settings menu, allowing you to configure everything to your exact liking.
  
  **Current modifications added** (23 patches to be exact, less than what the YouTube app has, but still gl in reading):
  
  - **Bypass certificate checks:** Bypasses certificate checks which prevent YouTube Music from working on Android Auto.
  - **Change header:** Adds an option to change the header logo in the top-left corner of the app.
  - **Change miniplayer color:** Adds an option to change the miniplayer background color to match the fullscreen player.
  - **Change start page:** Adds an option to set which page the app opens to instead of the default homepage.
  - **Check watch history domain name resolution:** Checks if the device DNS server is preventing user watch history from being saved.
  - **Disable DRC audio:** Adds an option to disable DRC (Dynamic Range Compression) audio.
  - **Disable QUIC protocol:** Adds an option to disable QUIC (Quick UDP Internet Connections) network protocol.
  - **Enable debugging:** Adds options for debugging and exporting Morphe logs to the clipboard.
  - **Enable exclusive audio playback:** Enables the option to play audio without loading the video track.
  - **Enable forced miniplayer:** Adds an option to force the miniplayer when switching between music videos, podcasts, or songs.
  - **Force original audio:** Adds an option to always use the original, untouched audio track.
  - **GmsCore support:** Allows the app to work without root by using a different package name when patched using GmsCore instead of Google Play Services.
  - **Hide ads:** Adds options to hide annoying ads, such as the fullscreen Premium popups and the "Get Music Premium" label.
  - **Hide buttons:** Adds options to hide the cast, history, notification, and search buttons.
  - **Hide category bar:** Adds an option to hide the category bar at the top of the homepage.
  - **Hide music video ads:** Adds an option to hide ads that appear while listening to or streaming music videos, podcasts, or songs.
  - **Miniplayer previous and next buttons:** Adds options to show previous and next track buttons directly in the miniplayer.
  - **Navigation bar:** Adds options to hide the navigation bar, labels, and individual buttons.
  - **Permanent repeat:** Adds an option to always repeat the current track/playlist even if it ends or another track is played.
  - **Remove background playback restrictions:** Removes restrictions on background playback, including playing kids' videos in the background.
  - **Sanitize sharing links:** Removes tracking query parameters from shared links.
  - **Spoof video streams:** Adds options to spoof the client video streams to fix playback buffering issues.
  - **Theme:** AMOLED Theme - Pure Pitch Black background.
  
  *YouTube Music as it should be — still better than Spotify. Still fuck Google.*

Summary: 'YouTube Music Premium'
Description: |
  This mod comes with a dedicated settings menu, allowing you to configure everything to your exact liking.

  <i>YouTube Music as it should be — still better than Spotify. Fuck Google.</i>

  <b>Current modifications added</b> (22 patches to be exact, less than what the YouTube app has, but still gl in reading):

  - <b>Bypass certificate checks:</b> Bypasses certificate checks which prevent YouTube Music from working on Android Auto.
  - <b>Change header:</b> Adds an option to change the header logo in the top-left corner of the app.
  - <b>Change miniplayer color:</b> Adds an option to change the miniplayer background color to match the fullscreen player.
  - <b>Change start page:</b> Adds an option to set which page the app opens to instead of the default homepage.
  - <b>Check watch history domain name resolution:</b> Checks if the device DNS server is preventing user watch history from being saved.
  - <b>Disable DRC audio:</b> Adds an option to disable DRC (Dynamic Range Compression) audio.
  - <b>Disable QUIC protocol:</b> Adds an option to disable QUIC (Quick UDP Internet Connections) network protocol.
  - <b>Enable exclusive audio playback:</b> Enables the option to play audio without loading the video track.
  - <b>Enable forced miniplayer:</b> Adds an option to force the miniplayer when switching between music videos, podcasts, or songs.
  - <b>Force original audio:</b> Adds an option to always use the original, untouched audio track.
  - <b>GmsCore support:</b> Allows the app to work without root by using a different package name when patched using GmsCore instead of Google Play Services.
  - <b>Hide ads:</b> Adds options to hide annoying ads, such as the fullscreen Premium popups and the "Get Music Premium" label.
  - <b>Hide buttons:</b> Adds options to hide the cast, history, notification, and search buttons.
  - <b>Hide category bar:</b> Adds an option to hide the category bar at the top of the homepage.
  - <b>Hide music video ads:</b> Adds an option to hide ads that appear while listening to or streaming music videos, podcasts, or songs.
  - <b>Miniplayer previous and next buttons:</b> Adds options to show previous and next track buttons directly in the miniplayer.
  - <b>Navigation bar:</b> Adds options to hide the navigation bar, labels, and individual buttons.
  - <b>Override certificate pinning:</b> Overrides SSL certificate pinning to allow network traffic interception and custom security certificates.
  - <b>Permanent repeat:</b> Adds an option to always repeat the current track/playlist even if it ends or another track is played.
  - <b>Remove background playback restrictions:</b> Removes restrictions on background playback, including playing kids' videos in the background.
  - <b>Sanitize sharing links:</b> Removes tracking query parameters from shared links.
  - <b>Spoof video streams:</b> Adds options to spoof the client video streams to fix playback buffering issues.
  - <b>Theme:</b> AMOLED Theme - Pure Pitch Black background.

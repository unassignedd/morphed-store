name: Deploy Public Store

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Built Repo from Private Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }} # Ide is kell a PAT token a Secrets-ből, hogy lássa a privát repót!
        run: gh release download store-apks -p "repo.tar.gz" --repo unassignedd/morphed-src --clobber

      - name: Unpack Repo Content to Root
        run: |
          # 1. Letakarítjuk a régi struktúrát a biztonság kedvéért, nem hagyunk szemetet
          rm -rf repo
          
          # 2. Közvetlenül kibontjuk a tarballt a gyökérbe. 
          # Mivel a morphed-src most már eleve a 'repo' mappát csomagolja be, ez pont a helyére rak mindent!
          tar -xzf repo.tar.gz
          
          # 3. Töröljük a felesleges, már kibontott archívumot
          rm -f repo.tar.gz

      - name: Verify Structure
        run: |
          echo "=== JELENLEGI REPO MAPPA TARTALMA ==="
          if [ -d "repo" ]; then
            ls -la repo
          else
            echo "HIBA: A repo mappa nem található a gyökérben! Valami elszállt a kibontásnál."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact (NO SIZE LIMIT!)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy Public Store

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Hard Clean Workspace
        run: |
          # Előre megsemmisítünk minden esetleges szemetet a futtató környezetben, ami nem a kód része
          rm -rf repo icons metadata *.apk tmp
          # Létrehozunk egy üres .nojekyll-t, hogy a GitHub Pages ne barmolja szét az F-Droid struktúrát
          touch .nojekyll

      - name: Download Built Repo from Private Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }} # Ide jön a PAT, hogy lássa a privát cuccot
        run: gh release download store-apks -p "repo.tar.gz" --repo unassignedd/morphed-src --clobber

      - name: Unpack Repo Content to Root
        run: |
          # Kibontjuk a friss, ropogós csomagot közvetlenül a gyökérbe
          tar -xzf repo.tar.gz
          
          # Az archívumot azonnal elégetjük, ne foglalja a helyet
          rm -f repo.tar.gz

      - name: Verify Structure
        run: |
          echo "=== JELENLEGI REPO MAPPA TARTALMA ==="
          if [ -d "repo" ]; then
            ls -la repo
          else
            echo "HIBA: A repo mappa nem található a gyökérben! Valami elszállt a kibontásnál."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact (NO SIZE LIMIT!)
        uses: actions/upload-pages-artifact@v3
        with:
          # A teljes gyökeret feltölti, de mivel felül le lett takarítva, CSAK a repo mappa és a .nojekyll marad ott!
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
